<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>H2-TTransform · LCOH Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<!-- echarts as a classic script: loads before the deferred module below -->
<script src="./vendor/echarts.min.js"></script>
<style>
  :root {
    --serif: Georgia, "PT Serif", "Times New Roman", serif;
    --sans: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --bg: #f5f7fa;
    --panel: #ffffff;
    --ink: #1b1f2a;
    --muted: #5c6473;
    --line: #e4e8ef;
    --accent: #2440c0;
    --s1: #444444;
    --pem: #e08214;
    --s5: #1b7837;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--sans);
    font-size: 22px; font-weight: 700; margin: 0; letter-spacing: .2px;
  }
  header .sub { color: var(--muted); font-size: 13px; }
  header .tag {
    margin-left: auto; font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
    padding: 3px 10px;
  }
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 18px;
    padding: 18px;
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .sidebar h2, .readouts h2 {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin: 4px 0 14px;
  }
  .ctrl { margin-bottom: 16px; }
  .ctrl .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .ctrl label { font-size: 13px; font-weight: 500; }
  .ctrl .val { font-family: var(--sans); font-size: 14px; color: var(--accent); font-weight: 700; }
  .ctrl .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  input[type=range] {
    width: 100%; height: 4px; border-radius: 4px; appearance: none;
    background: var(--line); outline: none; margin: 4px 0;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
    cursor: pointer; border: 2px solid #fff;
  }
  .toggles { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .toggle { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; }
  .switch { position: relative; width: 40px; height: 22px; }
  .switch input { display: none; }
  .switch .slider {
    position: absolute; inset: 0; background: var(--line); border-radius: 999px;
    transition: .15s; cursor: pointer;
  }
  .switch .slider::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .reset {
    width: 100%; margin-top: 6px; padding: 9px; border: 1px solid var(--line);
    background: #fff; border-radius: 8px; font-family: var(--sans); font-size: 13px;
    font-weight: 500; color: var(--ink); cursor: pointer;
  }
  .reset:hover { border-color: var(--accent); color: var(--accent); }
  .main { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  #chart { width: 100%; height: 540px; }
  .readouts .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .metric { text-align: left; }
  .metric .k { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .metric .v { font-family: var(--serif); font-size: 26px; font-weight: 700; margin-top: 3px; }
  .metric .u { font-size: 12px; color: var(--muted); }
  .err { color: #b00020; font-size: 14px; padding: 24px; white-space: pre-wrap; }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .readouts .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <h1>H<sub>2</sub>-TTransform · LCOH Terminal</h1>
  <span class="sub">Grey SMR vs. electrolysis-based H₂ in Trinidad — real 2026 USD/kg, incl. CBAM</span>
  <span class="tag" id="ng-tag">live model</span>
</header>

<div class="app">
  <aside class="panel sidebar">
    <h2>Parameters</h2>
    <div id="sliders"></div>
    <h2>Toggles</h2>
    <div class="toggles" id="toggles"></div>
    <button class="reset" id="reset">Reset to snapshot</button>
  </aside>

  <div class="main">
    <div class="panel"><div id="chart"></div></div>
    <div class="panel readouts">
      <div class="grid" id="readouts"></div>
    </div>
  </div>
</div>

<script type="module">
import { buildModel, computeSeries, computeBands, crossoverYear } from "./js/engine.js";

const COL = { S1: "#444444", PEM: "#e08214", S5: "#1b7837" };
const $ = (id) => document.getElementById(id);
let model, chart, controls = {}, defaults = {};

const SLIDERS = [
  { key: "ng_mmbtu", label: "Natural gas price", unit: "USD/MMBtu", min: 2, max: 15, step: 0.1,
    def: (p) => p.scalars.SMR_NGprice_MMBtu, fmt: (v) => v.toFixed(1),
    hint: "SMR feedstock. Snapshot is current subsidised price." },
  { key: "ppa_lcoe", label: "PPA electricity (start)", unit: "USD/kWh", min: 0.03, max: 0.12, step: 0.001,
    def: (p) => p.scalars.LCOE_PPA, fmt: (v) => v.toFixed(3),
    hint: "Dedicated renewable PPA price in the base year." },
  { key: "ppa_decline", label: "PPA cost decline", unit: "%/yr", min: 0, max: 7, step: 0.5,
    def: (p) => p.trajectory_defaults.ppa_decline * 100, fmt: (v) => v.toFixed(1), scale: 0.01,
    hint: "Real annual decline of the PPA price." },
  { key: "soec_decline", label: "SOEC learning", unit: "%/yr", min: 0, max: 12, step: 0.5,
    def: (p) => p.trajectory_defaults.soec_decline * 100, fmt: (v) => v.toFixed(1), scale: 0.01,
    hint: "Real CAPEX + stack cost decline (SOEC)." },
  { key: "pem_decline", label: "PEM learning", unit: "%/yr", min: 0, max: 7, step: 0.5,
    def: (p) => p.trajectory_defaults.pem_decline * 100, fmt: (v) => v.toFixed(1), scale: 0.01,
    hint: "Real CAPEX + stack cost decline (PEM)." },
  { key: "wacc", label: "WACC", unit: "%", min: 4, max: 14, step: 0.5,
    def: (p) => p.scalars.WACC * 100, fmt: (v) => v.toFixed(1), scale: 0.01,
    hint: "Weighted average cost of capital." },
  { key: "carbon_mult", label: "Carbon price ×", unit: "", min: 0.5, max: 2.5, step: 0.1,
    def: () => 1.0, fmt: (v) => v.toFixed(1) + "×",
    hint: "Scales the whole EU carbon-price path." },
];

const TOGGLES = [
  { key: "phase_on", label: "CBAM free-allowance phase-in",
    def: (p) => String(p.scalars.CBAM_phase_sel).toLowerCase() !== "off" },
  { key: "wh_on", label: "Waste-heat integration (SOEC)",
    def: (p) => String(p.scalars.WH_sel).toLowerCase() === "on" },
];

function leversFromControls() {
  const L = {};
  for (const s of SLIDERS) {
    const raw = parseFloat(controls[s.key].value);
    L[s.key] = s.scale ? raw * s.scale : raw;
  }
  for (const t of TOGGLES) L[t.key] = controls[t.key].checked;
  return L;
}

function buildControls(params) {
  const sBox = $("sliders");
  for (const s of SLIDERS) {
    const def = s.def(params);
    defaults[s.key] = def;
    const wrap = document.createElement("div");
    wrap.className = "ctrl";
    wrap.innerHTML =
      '<div class="row"><label>' + s.label + '</label>' +
      '<span class="val" id="val-' + s.key + '"></span></div>' +
      '<input type="range" id="ctl-' + s.key + '" min="' + s.min + '" max="' + s.max +
      '" step="' + s.step + '">' +
      '<div class="hint">' + s.hint + '</div>';
    sBox.appendChild(wrap);
    const inp = wrap.querySelector("input");
    inp.value = def;            // def() returns display units already
    controls[s.key] = inp;
    inp.addEventListener("input", () => { updateLabels(); render(); });
  }
  const tBox = $("toggles");
  for (const t of TOGGLES) {
    const def = t.def(params);
    defaults[t.key] = def;
    const wrap = document.createElement("div");
    wrap.className = "toggle";
    wrap.innerHTML = "<span>" + t.label + "</span>" +
      '<label class="switch"><input type="checkbox" id="ctl-' + t.key +
      '"><span class="slider"></span></label>';
    tBox.appendChild(wrap);
    const inp = wrap.querySelector("input");
    inp.checked = def;
    controls[t.key] = inp;
    inp.addEventListener("change", render);
  }
}

function updateLabels() {
  for (const s of SLIDERS) {
    const raw = parseFloat(controls[s.key].value);
    const txt = s.fmt(raw);
    $("val-" + s.key).textContent = txt + (s.unit && !txt.includes("×") ? " " + s.unit : "");
  }
}

function band(lower, delta, color, stack) {
  return [
    { name: stack + "-base", type: "line", stack, data: lower, symbol: "none",
      lineStyle: { opacity: 0 }, areaStyle: { opacity: 0 }, silent: true, z: 1,
      tooltip: { show: false }, legendHoverLink: false },
    { name: stack + "-fill", type: "line", stack, data: delta, symbol: "none",
      lineStyle: { opacity: 0 }, areaStyle: { color, opacity: 0.16 }, silent: true, z: 1,
      tooltip: { show: false }, legendHoverLink: false },
  ];
}

function render() {
  const L = leversFromControls();
  const s = computeSeries(model, L);
  const b = computeBands(model, L);
  const years = s.years.map(String);

  const s5Delta = b.S5_pess.map((v, i) => v - b.S5_opt[i]);
  const pemDelta = b.PEM_pess.map((v, i) => v - b.PEM_opt[i]);
  const xYear = crossoverYear(s);
  const cross = xYear ? [{ xAxis: String(xYear), yAxis: s.S5[s.years.indexOf(xYear)] }] : [];

  chart.setOption({
    animation: false,   // instant redraw on slider drag -> 2034 line stays fixed
    textStyle: { fontFamily: "DM Sans, sans-serif", color: "#1b1f2a" },
    grid: { left: 64, right: 24, top: 54, bottom: 48 },
    title: {
      text: "Grey SMR vs. electrolysis based H₂ production in Trinidad",
      left: "center", top: 8,
      textStyle: { fontFamily: "Georgia, serif", fontSize: 16, fontWeight: 700, color: "#1b1f2a" },
    },
    tooltip: {
      trigger: "axis",
      valueFormatter: (v) => (v == null ? "" : v.toFixed(2) + " USD/kg"),
      textStyle: { fontFamily: "DM Sans, sans-serif", fontSize: 12 },
    },
    legend: {
      data: ["Grey SMR", "PEM + RE PPA", "SOEC + RE PPA"], top: 30, right: 24,
      orient: "vertical", icon: "roundRect", textStyle: { fontSize: 12 },
    },
    xAxis: {
      type: "category", data: years, boundaryGap: false,
      axisLine: { lineStyle: { color: "#c7ccd6" } }, axisTick: { show: false },
      axisLabel: { fontFamily: "Georgia, serif", fontSize: 12, color: "#3a3f4b" },
      name: "Year", nameLocation: "middle", nameGap: 30,
      nameTextStyle: { fontFamily: "Georgia, serif", fontSize: 13 },
    },
    yAxis: {
      type: "value", name: "LCOH incl. CBAM (USD/kg H₂, real 2026)", nameLocation: "middle", nameGap: 44,
      nameTextStyle: { fontFamily: "Georgia, serif", fontSize: 13 },
      axisLabel: { fontFamily: "Georgia, serif", fontSize: 12, color: "#3a3f4b" },
      splitLine: { lineStyle: { color: "#eaedf2" } },
    },
    series: [
      ...band(b.S5_opt, s5Delta, COL.S5, "soecband"),
      ...band(b.PEM_opt, pemDelta, COL.PEM, "pemband"),
      { name: "Grey SMR", type: "line", data: s.S1, symbol: "none", z: 5,
        lineStyle: { color: COL.S1, width: 3, type: "dashed" }, itemStyle: { color: COL.S1 },
        markLine: {
          symbol: "none", silent: true,
          lineStyle: { color: "#9aa0ab", type: "dotted", width: 1.4 },
          label: { formatter: "full CBAM (2034)", fontFamily: "Georgia, serif", fontSize: 12, color: "#3a3f4b" },
          data: [{ xAxis: "2034" }],
        },
      },
      { name: "PEM + RE PPA", type: "line", data: s.PEM_PPA, symbol: "none", z: 5,
        lineStyle: { color: COL.PEM, width: 2.6 }, itemStyle: { color: COL.PEM } },
      { name: "SOEC + RE PPA", type: "line", data: s.S5, symbol: "none", z: 6,
        lineStyle: { color: COL.S5, width: 3 }, itemStyle: { color: COL.S5 },
        markPoint: cross.length ? {
          symbol: "circle", symbolSize: 11,
          itemStyle: { color: "#fff", borderColor: COL.S5, borderWidth: 2.5 },
          label: { show: true, position: "top", formatter: "parity " + xYear,
            fontFamily: "DM Sans", fontSize: 11, fontWeight: 700, color: COL.S5 },
          data: cross,
        } : { data: [] },
      },
    ],
  }, true);

  updateReadouts(s);
}

function updateReadouts(s) {
  const n = s.years.length - 1;
  const gap2026 = s.S5[0] - s.S1[0];
  const gap2040 = s.S5[n] - s.S1[n];
  const closed = gap2026 !== 0 ? (1 - gap2040 / gap2026) * 100 : 0;
  const xYear = crossoverYear(s);
  const metrics = [
    { k: "Crossover", v: xYear ? xYear : "none", u: xYear ? "SOEC = grey" : "within horizon" },
    { k: "SOEC 2040", v: s.S5[n].toFixed(2), u: "USD/kg" },
    { k: "Grey 2040", v: s.S1[n].toFixed(2), u: "USD/kg" },
    { k: "Gap 2040", v: gap2040.toFixed(2), u: "USD/kg (SOEC−grey)" },
    { k: "Gap closed", v: closed.toFixed(0) + "%", u: "2026 → 2040" },
  ];
  $("readouts").innerHTML = metrics.map((m) =>
    '<div class="metric"><div class="k">' + m.k + '</div><div class="v">' + m.v +
    '</div><div class="u">' + m.u + "</div></div>"
  ).join("");
}

function resetAll() {
  for (const s of SLIDERS) controls[s.key].value = defaults[s.key];
  for (const t of TOGGLES) controls[t.key].checked = defaults[t.key];
  updateLabels(); render();
}

async function main() {
  try {
    const params = await (await fetch("./data/params.json")).json();
    model = buildModel(params);
    $("ng-tag").textContent = "snapshot " + params.meta.exported;
    buildControls(params);
    chart = echarts.init($("chart"));
    window.addEventListener("resize", () => chart.resize());
    updateLabels();
    render();
    $("reset").addEventListener("click", resetAll);
  } catch (e) {
    document.querySelector(".app").innerHTML =
      '<div class="err">Terminal failed to start:\n\n' + (e && e.stack ? e.stack : e) + "</div>";
  }
}

main();
</script>
</body>
</html>
