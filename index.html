<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>H2-TTransform · LCOH Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --serif: Georgia, "PT Serif", "Times New Roman", serif;
    --sans: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --bg: #f5f7fa;
    --panel: #ffffff;
    --ink: #1b1f2a;
    --muted: #5c6473;
    --line: #e4e8ef;
    --accent: #2440c0;
    --s1: #444444;
    --pem: #e08214;
    --s5: #1b7837;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--serif);
    font-size: 22px; font-weight: 700; margin: 0; letter-spacing: .2px;
  }
  header .sub { color: var(--muted); font-size: 13px; }
  header .tag {
    margin-left: auto; font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
    padding: 3px 10px;
  }
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 18px;
    padding: 18px;
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .sidebar h2, .readouts h2 {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin: 4px 0 14px;
  }
  .ctrl { margin-bottom: 16px; }
  .ctrl .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .ctrl label { font-size: 13px; font-weight: 500; }
  .ctrl .val { font-family: var(--serif); font-size: 14px; color: var(--accent); font-weight: 700; }
  .ctrl .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  input[type=range] {
    width: 100%; height: 4px; border-radius: 4px; appearance: none;
    background: var(--line); outline: none; margin: 4px 0;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
    cursor: pointer; border: 2px solid #fff;
  }
  .toggles { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .toggle { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; }
  .switch { position: relative; width: 40px; height: 22px; }
  .switch input { display: none; }
  .switch .slider {
    position: absolute; inset: 0; background: var(--line); border-radius: 999px;
    transition: .15s; cursor: pointer;
  }
  .switch .slider::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .reset {
    width: 100%; margin-top: 6px; padding: 9px; border: 1px solid var(--line);
    background: #fff; border-radius: 8px; font-family: var(--sans); font-size: 13px;
    font-weight: 500; color: var(--ink); cursor: pointer;
  }
  .reset:hover { border-color: var(--accent); color: var(--accent); }
  .main { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  #chart { width: 100%; height: 540px; }
  .readouts .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .metric { text-align: left; }
  .metric .k { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .metric .v { font-family: var(--serif); font-size: 26px; font-weight: 700; margin-top: 3px; }
  .metric .u { font-size: 12px; color: var(--muted); }
  .err { color: #b00020; font-size: 14px; padding: 24px; }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .readouts .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <h1>H<sub>2</sub>-TTransform · LCOH Terminal</h1>
  <span class="sub">Grey SMR vs. electrolysis-based H₂ in Trinidad — real 2026 USD/kg, incl. CBAM</span>
  <span class="tag" id="ng-tag">live model</span>
</header>

<div class="app">
  <aside class="panel sidebar">
    <h2>Parameters</h2>
    <div id="sliders"></div>
    <h2>Toggles</h2>
    <div class="toggles" id="toggles"></div>
    <button class="reset" id="reset">Reset to snapshot</button>
  </aside>

  <div class="main">
    <div class="panel"><div id="chart"></div></div>
    <div class="panel readouts">
      <h2>Readouts @ 2040 (central learning)</h2>
      <div class="grid" id="readouts"></div>
    </div>
  </div>
</div>

<!-- engine + snapshot data + UI, all external classic scripts (run on file:// too) -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="./js/engine.js"></script>
<script src="./data/params.js"></script>
<script src="./ui.js"></script>
</body>
</html>
